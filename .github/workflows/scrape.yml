name: TheNewsDip Cloud Harvester Engine

on:
  schedule:
    # Runs automatically every 15 minutes
    - cron: '*/15 * * * *'
  workflow_dispatch: # Allows manual trigger button

jobs:
  run-harvester:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository code
      uses: actions/checkout@v4

    - name: Set up Python Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    - name: Install High-Performance NLP Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install requests spacy beautifulsoup4 click feedparser
        python -m spacy download en_core_web_sm

    - name: Execute Live Scavenger & Cloud Sync
      env:
        # Pulls from your GitHub Secrets vault
        API_SECRET_KEY: ${{ secrets.API_SECRET_KEY }}
      run: python harvester.py
